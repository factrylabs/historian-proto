syntax = "proto3";

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

option go_package = "github.com/factrylabs/historian-proto/historian;historian";

package proto;

// https://developers.google.com/protocol-buffers/docs/proto3

// The historian service definition.
// CollectorUUID gets passed in the header
service Historian {
  // core collector functions

  rpc GetCollector (google.protobuf.Empty) returns (Collector);
  rpc RegisterCollector (RegisterCollectorSchema) returns (Collector);

  rpc CreatePointsStream (stream Points) returns (CreatePointsReply);
  rpc CreatePoints (Points) returns (CreatePointsReply);

  rpc GetMeasurements (MeasurementRequest) returns (Measurements);
  rpc CreateMeasurements (CreateMeasurementsRequest) returns (CreateMeasurementsReply);

  rpc CreateLogsStream (stream Logs) returns (CreateLogsReply);
  rpc CreateLogs (Logs) returns (CreateLogsReply);

  rpc CreateStatisticsStream (stream Statistics) returns (CreateStatisticsReply);
  rpc CreateStatistics (Statistics) returns (CreateStatisticsReply);

  rpc GetCollectorUpdate (CollectorUpdateMetadata) returns (stream File);

  rpc UpdateCollectorState(google.protobuf.Struct) returns (google.protobuf.Empty);
  rpc UpdateHealth(HealthUpdates) returns (HealthUpdateReply);

  rpc MigrateSettings(MigrationRequest) returns (google.protobuf.Empty);

  rpc GetInfo (google.protobuf.Empty) returns (HistorianInfo);

  // additional functions

  rpc QueryTimeseries (QueryTimeseriesRequest) returns (QueryTimeseriesResponse);
  rpc GetAssets (GetAssetsRequest) returns (Assets);
  rpc GetAssetProperties (GetAssetPropertiesRequest) returns (AssetProperties);
  rpc GetMeasurementsByFilter (GetMeasurementsByFilterRequest) returns (Measurements);
  rpc GetCollectors (GetCollectorsRequest) returns (Collectors);
  rpc GetTimeseriesDatabases (GetTimeseriesDatabasesRequest) returns (TimeseriesDatabases);
}

message CollectorHA {
  string mainCollectorUUID = 1;
  string host = 2;
  int32 healthPort = 3;
  int32 timeout = 4;
  int32 stopDelay = 5;
}

message Collector {
  string uuid = 1;
  string type = 2;
  string buildversion = 3;
  string description = 4;
  string status = 5;
  google.protobuf.Struct settings = 6;
  CollectorHA haSettings = 7;
  string buildOs=8;
  string buildArch=9;
  bool updateAvailable=10;
  string updateToVersion=11;
  google.protobuf.Struct state = 12;
}

message RegisterCollectorSchema {
  string collectorType = 1;
  string buildVersion = 2;
  google.protobuf.Struct measurementSettingsSchema = 3;
  google.protobuf.Struct settingsSchema = 4;
  string buildOs = 5;
  string buildArch = 6;
}

message Point {
  string measurementUUID = 1;
  google.protobuf.Timestamp timestamp = 2;
  google.protobuf.Value value = 3;
  string status = 4;
  google.protobuf.Struct tags = 5;
}

// Used to send batches of points over the stream and to marshal a batch of points to file
message Points {
  repeated Point points = 1;
}

// Provide an empty message instead of using default empty message if we want to add
// something in the future
message CreatePointsReply {}

message Measurement {
  string uuid = 1;
  string name = 2;
  string status = 3;
  google.protobuf.Timestamp createdAt = 4;
  google.protobuf.Timestamp updatedAt = 5;
  google.protobuf.Struct settings = 6;
  string datatype = 7;
  EngineeringSpecs engineeringSpecs = 8;
}

message EngineeringSpecs {
  optional string uom = 1;
  optional double valueMin = 2;
  optional double valueMax = 3;
  optional double limitLo = 4;
  optional double limitHi = 5;
}

message MeasurementRequest {
  google.protobuf.Timestamp since = 1;
  string collectorUUID = 2;
}

message Measurements {
  repeated Measurement measurements = 1;
}

message Log {
  google.protobuf.Struct message = 1;
  enum Level {
    PANIC = 0;
    FATAL = 1;
    ERROR = 2;
    WARNING = 3;
    INFO = 4;
    DEBUG = 5;
    TRACE = 6;
  }
  Level level = 2;
  google.protobuf.Timestamp timestamp = 3;
  string health = 4 [deprecated = true];
  string measurementUUID = 5;
}

message Logs {
  repeated Log logs = 1;
}

message CreateLogsReply {}

message Statistics {
  // System statistics
  double systemUptime = 1; // As time.Duration seconds
  double systemCPUUsage = 2;
  double systemMemoryUsage = 3;
  int64 systemFreeDiskSpace = 4;

  // Collector statistics
  double collectorUptime = 5; // As time.Duration seconds
  int64 collectorPointsSent = 6;
  int64 collectorGoodPoints = 7;
  int64 collectorBadPoints = 8;

  // Buffer statistics
  int64 bufferCurrentSize = 9;
  int64 bufferDiskFlushes = 10;
  int64 bufferErrorFiles = 11;

  // Other statistics
  google.protobuf.Struct other = 12;

  google.protobuf.Timestamp timestamp = 13;

  // Extra system statistics
  int64 systemTotalDiskSpace = 14;
  int64 systemMemoryFree = 15;
  int64 systemMemoryTotal = 16;
}

message CreateStatisticsReply {}

message CreateMeasurementsReply {}

message CreateMeasurement {
  string name = 1;
  optional string dataType = 2;
  optional string description = 3;
  bool autoOnboard = 4;
  optional google.protobuf.Struct attributes = 5;
  optional google.protobuf.Struct settings = 6;
}

message CreateMeasurementsRequest {
  repeated CreateMeasurement measurements = 1;
}

message CollectorUpdateMetadata{
 string product =1;
 string version=2;
 string os = 3;
 string arch=4;
}

message File {
  bytes chunk=1;
}

message MigrateMeasurementSettings {
  string measurementUUID = 1;
  google.protobuf.Struct settings = 2;
}

message MigrationRequest {
  google.protobuf.Struct settings = 1;
  repeated MigrateMeasurementSettings measurementSettings = 2;
}

message HistorianInfo {
  string version = 1;
  string apiVersion = 2;
}

message HealthUpdates {
  repeated HealthUpdate healthUpdates = 1;
}

message HealthUpdate {
  string health = 1;
  google.protobuf.Timestamp timestamp = 2;
}

message HealthUpdateReply {}

message MeasurementByName {
  string database = 1;
  string measurement = 2;
}

message ValueFilter {
  google.protobuf.Value value = 1;
  string operator = 2; // see Factry Historian documentation for supported operators
  optional string condition = 3; // see Factry Historian documentation for supported conditions
}

message Aggregation {
  string name = 1; // see Factry Historian documentation for supported aggregations
  string period = 2;
  string fillType = 3; // see Factry Historian documentation for supported fill types
  repeated google.protobuf.Value arguments = 4;
}

message QueryTimeseriesRequest {
  optional Aggregation aggregation = 1;
  repeated string measurementUUIDs = 2;
  repeated string assetPropertyUUIDs = 3;
  repeated MeasurementByName measurements = 4;
  google.protobuf.Timestamp start = 5;
  optional google.protobuf.Timestamp end = 6;
  optional google.protobuf.Struct tags = 7;
  repeated string groupBy = 8;
  optional int64 limit = 9;
  optional int64 offset = 10;
  optional bool desc = 11;
  optional bool join = 12;
  repeated ValueFilter valueFilters = 13;
  optional bool onlyChanges = 14;
}

message SeriesPoint {
  int64 timestamp = 1; // Unix timestamp in milliseconds since epoch (UTC)
  google.protobuf.Value value = 2;
}

message Series {
  google.protobuf.Struct tags = 1;
  string measurement = 2;
  optional string measurementUUID = 3;
  string datatype = 4;
  string database = 5;
  repeated string fields = 6;
  repeated SeriesPoint dataPoints = 7;
}

message QueryTimeseriesResponse {
  repeated Series series = 1;
  optional google.protobuf.Struct attributes = 2;
}

message GetAssetsRequest {
  optional string keyword = 1;
  optional string path = 2;
  repeated string parentUUIDs = 3;
  repeated string uuids = 4;
}

message Asset {
  string uuid = 1;
  string name = 2;
  string description = 3;
  string parentUUID = 4;
  string assetPath = 5;
  google.protobuf.Struct attributes = 6;
  google.protobuf.Struct metadata = 7;
  google.protobuf.Timestamp createdAt = 8;
  google.protobuf.Timestamp updatedAt = 9;
}

message Assets {
  repeated Asset assets = 1;
}

message GetAssetPropertiesRequest {
  repeated string assetUUIDs = 1;
  bool recursive = 2;
  optional string keyword = 3;
  repeated string datatypes = 4;
  repeated string uuids = 5;
}

message AssetProperty {
  string uuid = 1;
  string assetUUID = 2;
  string measurementUUID = 3;
  string name = 4;
  string description = 5;
  string datatype = 6;
  google.protobuf.Struct attributes = 7;
  google.protobuf.Struct metadata = 8;
  google.protobuf.Timestamp createdAt = 9;
  google.protobuf.Timestamp updatedAt = 10;
}

message AssetProperties {
  repeated AssetProperty assetProperties = 1;
}

message Pagination {
  optional int64 limit = 1; // limit is the maximum number of results to return, default is 100 if not provided
  optional int64 offset = 2; // offset is the number of results to skip before starting to return results
  optional int64 page = 3; // page is the page number to return, calculated as offset/limit + 1. If page is provided, offset is ignored
}

message GetMeasurementsByFilterRequest {
  optional string keyword = 1;
  optional string quality = 2;
  repeated string statuses = 3;
  repeated string labels = 4;
  repeated string databaseUUIDs = 5;
  repeated string collectorUUIDs = 6;
  optional string assetUUID = 7;
  repeated string datatypes = 8;
  optional bool excludeCalculations = 9;
  optional bool includeDependencies = 10;
  optional Pagination pagination = 11;
}

message GetCollectorsRequest {
  optional string keyword = 1;
  repeated string statuses = 2;
}

message Collectors {
  repeated Collector collectors = 1;
}

message GetTimeseriesDatabasesRequest {
  optional string keyword = 1;
}

message TimeseriesDatabase {
  string uuid = 1;
  string name = 2;
  string description = 3;
  string status = 4;
  google.protobuf.Struct attributes = 5;
  google.protobuf.Struct metadata = 6;
  google.protobuf.Timestamp createdAt = 7;
  google.protobuf.Timestamp updatedAt = 8;
}

message TimeseriesDatabases {
  repeated TimeseriesDatabase timeseriesDatabases = 1;
}
